name: ERP Contable CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # ============================================================
  # FASE 1: TESTS DEL BACKEND LARAVEL
  # ============================================================
  test-backend:
    name: Tests Backend (Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sistema_contable_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, bcmath, intl, gd, zip
          coverage: xdebug
          tools: composer:v2

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: Backend-laravel/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('Backend-laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Instalar dependencias de Composer
        working-directory: ./Backend-laravel
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Preparar archivo .env
        working-directory: ./Backend-laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          # Configurar BD para tests
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=mysql|' .env
          sed -i 's|^# DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^# DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|^# DB_DATABASE=.*|DB_DATABASE=sistema_contable_testing|' .env
          sed -i 's|^# DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|^# DB_PASSWORD=.*|DB_PASSWORD=root|' .env
          # Asegurarse que esten descomentados (en algunos .env.example vienen con #)
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=sistema_contable_testing|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=root|' .env

      - name: Esperar que MySQL este listo
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent; then
              echo "MySQL listo"
              break
            fi
            echo "Esperando MySQL... intento $i"
            sleep 2
          done

      - name: Ejecutar migraciones
        working-directory: ./Backend-laravel
        run: php artisan migrate --force

      - name: Ejecutar suite de tests (PHPUnit)
        working-directory: ./Backend-laravel
        run: |
          ./vendor/bin/phpunit \
            --coverage-html coverage-report \
            --coverage-clover coverage.xml \
            --log-junit report.xml

      - name: Subir reportes de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            Backend-laravel/coverage-report/
            Backend-laravel/coverage.xml
            Backend-laravel/report.xml

  # ============================================================
  # FASE 2: LINT Y BUILD DEL FRONTEND
  # ============================================================
  test-frontend:
    name: Lint y Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: Frontend/pnpm-lock.yaml

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias
        working-directory: ./Frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./Frontend
        run: pnpm run lint
        continue-on-error: true

      - name: Build de produccion
        working-directory: ./Frontend
        run: pnpm run build

      - name: Subir bundle compilado
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/
          retention-days: 7

  # ============================================================
  # FASE 3: DESPLIEGUE A PRODUCCION (solo en main)
  # ============================================================
  deploy-produccion:
    name: Desplegar a Produccion
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build Frontend
        working-directory: ./Frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Instalar dependencias del Backend (produccion)
        working-directory: ./Backend-laravel
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      - name: Cachear configuracion de Laravel
        working-directory: ./Backend-laravel
        run: |
          # Solo cacheamos lo seguro. config/route cache se hace en el servidor
          # despues de que .env este en su lugar.
          php artisan view:cache || true

      - name: Preparar artefacto de despliegue
        run: |
          mkdir -p deploy_produccion
          # Frontend compilado a la raiz publica
          cp -a Frontend/dist/. deploy_produccion/
          # Backend Laravel completo
          cp -r Backend-laravel deploy_produccion/

      - name: Sincronizar via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_produccion/
          server-dir: /
          exclude: |
            **/.env
            **/.env.example
            Backend-laravel/tests/**
            Backend-laravel/coverage-report/**
            Backend-laravel/phpunit.xml
            Backend-laravel/.phpunit.result.cache
            Backend-laravel/storage/logs/**
            Backend-laravel/_ide_helper.php
            Backend-laravel/_ide_helper_models.php
            **/.git*
            **/node_modules/**
