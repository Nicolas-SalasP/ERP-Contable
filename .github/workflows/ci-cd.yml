name: ERP Contable CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev", "NSalas-dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # ============================================================
  # FASE 1A: TESTS BACKEND CONTRA SQLITE (rapido)
  # ============================================================
  test-backend-sqlite:
    name: Tests Backend (SQLite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, pdo_mysql, mbstring, json, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: Backend-laravel/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('Backend-laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Instalar dependencias de Composer
        working-directory: Backend-laravel
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparar archivo .env de testing
        working-directory: Backend-laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Ejecutar suite de tests contra SQLite
        working-directory: Backend-laravel
        run: php artisan test

  # ============================================================
  # FASE 1B: TESTS BACKEND CONTRA MYSQL (validacion produccion)
  # ============================================================
  test-backend-mysql:
    name: Tests Backend (MySQL - validacion produccion)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sistema_contable_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: Backend-laravel/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('Backend-laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Instalar dependencias de Composer
        working-directory: Backend-laravel
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparar archivo .env de testing
        working-directory: Backend-laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Esperar que MySQL este listo
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL listo"
              break
            fi
            echo "Esperando MySQL... intento $i/30"
            sleep 2
          done

      - name: Configurar collation utf8mb4_unicode_ci en BD de testing
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "
            ALTER DATABASE sistema_contable_testing
            CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          "

      - name: Ejecutar suite de tests contra MySQL
        working-directory: Backend-laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: sistema_contable_testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test tests

  # ============================================================
  # FASE 2: LINT + BUILD DEL FRONTEND
  # ============================================================
  test-frontend:
    name: Lint y Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar lint
        working-directory: Frontend
        run: pnpm run lint
        continue-on-error: true

      - name: Ejecutar build de produccion
        working-directory: Frontend
        run: pnpm run build

      - name: Subir artifact del build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/dist
          retention-days: 7

  # ============================================================
  # FASE 3: DEPLOY A HOSTING (SOLO EN MAIN)
  # ============================================================
  deploy-produccion:
    name: Deploy a Hosting Produccion
    runs-on: ubuntu-latest
    needs: [test-backend-sqlite, test-backend-mysql, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, bcmath, intl, gd, zip
          tools: composer:v2

      - name: Instalar dependencias de Composer (sin dev)
        working-directory: Backend-laravel
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - name: Instalar dependencias frontend
        run: pnpm install --frozen-lockfile

      - name: Build de produccion frontend
        working-directory: Frontend
        run: pnpm run build

      - name: Subir backend al hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Backend-laravel/
          server-dir: /backend/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.example
            **/storage/logs/*
            **/storage/framework/cache/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*

      - name: Subir frontend al hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Frontend/dist/
          server-dir: /public_html/