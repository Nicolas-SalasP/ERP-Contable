name: E2E Tests (Playwright)

on:
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Correr suite completa (no solo smoke)'
        type: boolean
        default: true
  push:
    branches: [ "main", "dev", "NSalas-dev" ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sistema_contable_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # DECIDIR SCOPE: smoke o suite completa
      # -----------------------------------------------------------
      - name: Decidir scope de tests
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "command=pnpm e2e" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_suite }}" = "true" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "command=pnpm e2e" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "command=pnpm e2e" >> $GITHUB_OUTPUT
          else
            echo "mode=smoke" >> $GITHUB_OUTPUT
            echo "command=pnpm e2e:smoke" >> $GITHUB_OUTPUT
          fi

      - name: Mostrar scope elegido
        run: echo "Modo - ${{ steps.scope.outputs.mode }}; Comando - ${{ steps.scope.outputs.command }}"

      # -----------------------------------------------------------
      # BACKEND
      # -----------------------------------------------------------
      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, bcmath, intl, gd, zip

      - name: Instalar dependencias backend
        working-directory: ./Backend-laravel
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configurar .env del backend
        working-directory: ./Backend-laravel
        run: |
          cp .env.example .env
          php artisan key:generate

          # Eliminar cualquier linea (comentada o no) que defina las variables DB
          sed -i '/^#\? *DB_CONNECTION=/d' .env
          sed -i '/^#\? *DB_HOST=/d' .env
          sed -i '/^#\? *DB_PORT=/d' .env
          sed -i '/^#\? *DB_DATABASE=/d' .env
          sed -i '/^#\? *DB_USERNAME=/d' .env
          sed -i '/^#\? *DB_PASSWORD=/d' .env

          # Appendear configuracion correcta para el MySQL del runner
          cat >> .env <<'ENVEOF'
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=sistema_contable_e2e
          DB_USERNAME=root
          DB_PASSWORD=root
          ENVEOF

          # Debug: mostrar las lineas DB efectivas (sin exponer secrets en prod)
          echo "=== Config DB efectiva ==="
          grep "^DB_" .env

      - name: Esperar a que MySQL este listo
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL listo"
              break
            fi
            echo "Esperando MySQL... ($i/30)"
            sleep 2
          done

      - name: Migraciones + seeds del backend
        working-directory: ./Backend-laravel
        run: |
          php artisan migrate --force
          php artisan db:seed --force

      - name: Levantar backend en background
        working-directory: ./Backend-laravel
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          # Esperar a que responda
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:8000 > /dev/null 2>&1 || curl -sf http://127.0.0.1:8000/api > /dev/null 2>&1; then
              echo "Backend respondiendo"
              break
            fi
            echo "Esperando backend... ($i/15)"
            sleep 2
          done

      # -----------------------------------------------------------
      # FRONTEND
      # -----------------------------------------------------------
      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Instalar dependencias frontend
        working-directory: ./Frontend
        run: pnpm install --frozen-lockfile

      - name: Build del frontend
        working-directory: ./Frontend
        run: pnpm build
        env:
          VITE_API_URL: http://127.0.0.1:8000/api

      - name: Levantar frontend (preview server)
        working-directory: ./Frontend
        run: |
          pnpm preview --port=3000 --host=127.0.0.1 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          for i in {1..10}; do
            if curl -sf http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "Frontend respondiendo"
              break
            fi
            echo "Esperando frontend... ($i/10)"
            sleep 2
          done

      # -----------------------------------------------------------
      # PLAYWRIGHT
      # -----------------------------------------------------------
      - name: Instalar browsers de Playwright
        working-directory: ./Frontend
        run: pnpm e2e:install

      - name: Ejecutar tests E2E
        working-directory: ./Frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL || 'admin@test.cl' }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD || 'password' }}
          CI: 'true'
        run: pnpm e2e

      - name: Subir reporte HTML como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 7

      # -----------------------------------------------------------
      # DEBUGGING EN CASO DE FALLO
      # -----------------------------------------------------------
      - name: Mostrar log del backend si fallo
        if: failure()
        run: |
          echo "=== Backend log ==="
          cat /tmp/backend.log 2>/dev/null | tail -50 || echo "Sin log de backend"
          echo ""
          echo "=== Frontend log ==="
          cat /tmp/frontend.log 2>/dev/null | tail -30 || echo "Sin log de frontend"

      - name: Subir reporte HTML como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ steps.scope.outputs.mode }}-${{ github.run_id }}
          path: |
            Frontend/playwright-report/
            Frontend/test-results/
          retention-days: 7
          if-no-files-found: warn
