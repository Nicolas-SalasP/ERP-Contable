name: E2E Tests (Playwright)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sistema_contable_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # BACKEND
      # -----------------------------------------------------------
      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, bcmath, intl, gd, zip

      - name: Instalar dependencias backend
        working-directory: ./Backend-laravel
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configurar .env del backend
        working-directory: ./Backend-laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          # Apuntar a MySQL del runner
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=sistema_contable_e2e/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Migraciones + seeds del backend
        working-directory: ./Backend-laravel
        run: |
          php artisan migrate --force
          # Si tenes un seeder de tests E2E, llamalo aca:
          # php artisan db:seed --class=E2ESeeder --force
          # Si no, usa el seeder por defecto:
          php artisan db:seed --force

      - name: Levantar backend en background
        working-directory: ./Backend-laravel
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          sleep 5
          curl -f http://127.0.0.1:8000 || echo "Backend respondiendo"

      # -----------------------------------------------------------
      # FRONTEND
      # -----------------------------------------------------------
      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Instalar dependencias frontend
        working-directory: ./Frontend
        run: pnpm install --frozen-lockfile

      - name: Build del frontend
        working-directory: ./Frontend
        run: pnpm build
        env:
          VITE_API_URL: http://127.0.0.1:8000/api

      - name: Levantar frontend (preview server)
        working-directory: ./Frontend
        run: |
          pnpm preview --port=3000 --host=127.0.0.1 &
          sleep 3

      # -----------------------------------------------------------
      # PLAYWRIGHT
      # -----------------------------------------------------------
      - name: Instalar browsers de Playwright
        working-directory: ./Frontend
        run: pnpm e2e:install

      - name: Ejecutar tests E2E
        working-directory: ./Frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL || 'admin@test.cl' }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD || 'password' }}
          CI: 'true'
        run: pnpm e2e

      - name: Subir reporte HTML como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 7
